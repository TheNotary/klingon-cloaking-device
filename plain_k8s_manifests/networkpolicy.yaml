apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: klingon-cloaking-device-netpol
  namespace: klingon-cloaking-device
  labels:
    app.kubernetes.io/name: klingon-cloaking-device
spec:
  podSelector:
    matchLabels:
      app: klingon-cloaking-device
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - ports:
        - port: 9000
          protocol: UDP
  egress:
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
          podSelector:
            matchLabels:
              k8s-app: kube-dns
      ports:
        - port: 53
          protocol: UDP
        - port: 53
          protocol: TCP
    - ports:
        - port: 443
          protocol: TCP
