apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: klingon-cloaking-device-servicepatch
  labels:
    app.kubernetes.io/name: klingon-cloaking-device
rules:
  - apiGroups: [""]
    resources: ["services"]
    verbs: ["get", "list", "patch"]
  - apiGroups: ["networking.k8s.io"]
    resources: ["networkpolicies"]
    verbs: ["get", "patch"]
  - apiGroups: ["klingon-cloaking-device.thenotary.github.io"]
    resources: ["cloakingdevices"]
    verbs: ["get", "list", "watch"]
