apiVersion: apps/v1
kind: Deployment
metadata:
  name: klingon-cloaking-device
  namespace: klingon-cloaking-device
  labels:
    app.kubernetes.io/name: klingon-cloaking-device
spec:
  replicas: 1
  selector:
    matchLabels:
      app: klingon-cloaking-device
  template:
    metadata:
      labels:
        app: klingon-cloaking-device
    spec:
      serviceAccountName: klingon-cloaking-device
      containers:
        - name: klingon-cloaking-device
          image: ghcr.io/thenotary/klingon-cloaking-device-server:latest # <-- UPDATE
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 9000
              protocol: UDP
              name: knock
            - containerPort: 9001
              protocol: TCP
              name: auth
          env:
            - name: KCD_KNOCK_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: klingon-cloaking-device-credentials
                  key: kcd-knock-password
            - name: KCD_ACCESS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: klingon-cloaking-device-credentials
                  key: kcd-access-password
            - name: KCD_IP_TTL_HOURS
              value: "24"
            - name: KCD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: KCD_AUTH_NETPOL_NAME
              value: klingon-cloaking-device-auth-netpol
            - name: KCD_ALWAYS_ALLOWED_CIDRS
              # Azure-specific defaults — adjust for your cloud provider.
              value: "168.63.129.16/32,10.224.0.0/16"
          resources:
            requests:
              cpu: 5m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 256Mi
          readinessProbe:
            tcpSocket:
              port: 9001
            initialDelaySeconds: 3
            periodSeconds: 5
          livenessProbe:
            tcpSocket:
              port: 9001
            initialDelaySeconds: 5
            periodSeconds: 10
          volumeMounts:
            - name: tls-certs
              mountPath: /certs
              readOnly: true
      volumes:
        - name: tls-certs
          secret:
            secretName: klingon-cloaking-device-tls  # <-- UPDATE: your kubernetes.io/tls Secret
