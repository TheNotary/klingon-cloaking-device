apiVersion: v1
kind: Namespace
metadata:
  name: kcd-integration-test
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ssh-server
  namespace: kcd-integration-test
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ssh-server
  template:
    metadata:
      labels:
        app: ssh-server
    spec:
      containers:
        - name: ssh-server
          image: lscr.io/linuxserver/openssh-server:latest
          ports:
            - containerPort: 2222
              protocol: TCP
              name: ssh
          env:
            - name: PUID
              value: "1000"
            - name: PGID
              value: "1000"
            - name: PASSWORD_ACCESS
              value: "true"
            - name: USER_NAME
              value: "testuser"
            - name: USER_PASSWORD
              value: "testpassword"
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
---
apiVersion: v1
kind: Service
metadata:
  name: ssh-server
  namespace: kcd-integration-test
spec:
  type: LoadBalancer
  ports:
    - port: 22
      targetPort: 2222
      protocol: TCP
      name: ssh
  selector:
    app: ssh-server
