name: Release CLI Binaries

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"

permissions:
  contents: write

jobs:
  build-cli:
    name: CLI (${{ matrix.target }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-musl
            runner: ubuntu-latest
            artifact: kcd-linux-amd64
          - target: aarch64-unknown-linux-musl
            runner: ubuntu-latest
            artifact: kcd-linux-arm64
          - target: x86_64-apple-darwin
            runner: macos-latest
            artifact: kcd-darwin-amd64
          - target: aarch64-apple-darwin
            runner: macos-latest
            artifact: kcd-darwin-arm64
          - target: x86_64-pc-windows-msvc
            runner: windows-latest
            artifact: kcd-windows-amd64.exe

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install musl tools (Linux)
        if: contains(matrix.target, 'linux-musl')
        run: sudo apt-get update && sudo apt-get install -y musl-tools

      - name: Install cross (Linux ARM64)
        if: matrix.target == 'aarch64-unknown-linux-musl'
        run: cargo install cross --git https://github.com/cross-rs/cross

      - name: Extract version from tag
        id: version
        shell: bash
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Stamp crate versions
        shell: bash
        run: |
          for toml in cli-rs/Cargo.toml kcd-proto/Cargo.toml; do
            sed -i.bak "s/^version = \".*\"/version = \"${{ steps.version.outputs.VERSION }}\"/" "$toml"
          done

      - name: Build (native)
        if: matrix.target != 'aarch64-unknown-linux-musl'
        shell: bash
        run: |
          cd cli-rs
          cargo build --release --target ${{ matrix.target }}

      - name: Build (cross — Linux ARM64)
        if: matrix.target == 'aarch64-unknown-linux-musl'
        shell: bash
        run: |
          cd cli-rs
          cross build --release --target ${{ matrix.target }}

      - name: Rename binary (Unix)
        if: runner.os != 'Windows'
        run: cp cli-rs/target/${{ matrix.target }}/release/klingon-cloaking-device ${{ matrix.artifact }}

      - name: Rename binary (Windows)
        if: runner.os == 'Windows'
        run: copy cli-rs\target\${{ matrix.target }}\release\klingon-cloaking-device.exe ${{ matrix.artifact }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}

  create-release:
    needs: build-cli
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: artifacts/**/*
