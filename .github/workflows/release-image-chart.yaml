name: Release Image & Chart

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/klingon-cloaking-device-server

jobs:
  build-and-push-container:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Normalize owner to lowercase
        run: echo "OWNER_LC=${GITHUB_REPOSITORY_OWNER,,}" >> "$GITHUB_ENV"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Stamp crate versions
        run: |
          for toml in api-rs/Cargo.toml cli-rs/Cargo.toml kcd-proto/Cargo.toml; do
            sed -i "s/^version = \".*\"/version = \"${{ steps.version.outputs.VERSION }}\"/" "$toml"
          done

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.OWNER_LC }}/klingon-cloaking-device-server:${{ steps.version.outputs.VERSION }}
            ${{ env.REGISTRY }}/${{ env.OWNER_LC }}/klingon-cloaking-device-server:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  publish-helm-chart:
    runs-on: ubuntu-latest
    needs: build-and-push-container
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Normalize owner to lowercase
        run: echo "OWNER_LC=${GITHUB_REPOSITORY_OWNER,,}" >> "$GITHUB_ENV"

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Stamp Chart.yaml versions
        run: |
          sed -i "s/^version: .*/version: ${{ steps.version.outputs.VERSION }}/" helm_chart/Chart.yaml
          sed -i "s/^appVersion: .*/appVersion: ${{ steps.version.outputs.VERSION }}/" helm_chart/Chart.yaml

      - name: Set up Helm
        uses: azure/setup-helm@v4

      - name: Log in to GHCR for Helm
        run: echo "${{ secrets.GITHUB_TOKEN }}" | helm registry login ${{ env.REGISTRY }} --username ${{ github.actor }} --password-stdin

      - name: Package Helm chart
        run: |
          helm package ./helm_chart \
            --version "${{ steps.version.outputs.VERSION }}" \
            --app-version "${{ steps.version.outputs.VERSION }}"

      - name: Push Helm chart to GHCR
        run: |
          helm push klingon-cloaking-device-${{ steps.version.outputs.VERSION }}.tgz \
            oci://${{ env.REGISTRY }}/${{ env.OWNER_LC }}/charts

