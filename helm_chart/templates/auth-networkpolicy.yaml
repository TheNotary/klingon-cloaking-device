{{- if .Values.networkPolicy.enabled }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ .Chart.Name }}-auth-netpol
  namespace: {{ include "kcd.namespace" . }}
  labels:
    app.kubernetes.io/name: {{ .Chart.Name }}
    app.kubernetes.io/managed-by: {{ .Release.Service }}
spec:
  podSelector:
    matchLabels:
      app: {{ .Chart.Name }}
  policyTypes:
    - Ingress
  {{- if .Values.networkPolicy.healthProbeSourceCIDR }}
  ingress:
    - from:
        - ipBlock:
            cidr: {{ .Values.networkPolicy.healthProbeSourceCIDR }}
      ports:
        - port: {{ .Values.ports.auth }}
          protocol: TCP
  {{- else }}
  ingress: []
  {{- end }}
{{- end }}
