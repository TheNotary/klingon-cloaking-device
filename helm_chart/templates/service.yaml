apiVersion: v1
kind: Service
metadata:
  name: {{ .Chart.Name }}
  namespace: {{ include "kcd.namespace" . }}
  labels:
    app.kubernetes.io/name: {{ .Chart.Name }}
    app.kubernetes.io/managed-by: {{ .Release.Service }}
  annotations:
    service.beta.kubernetes.io/azure-load-balancer-health-probe-protocol: tcp
    service.beta.kubernetes.io/azure-load-balancer-health-probe-port: "{{ .Values.ports.auth }}"
spec:
  type: LoadBalancer
  externalTrafficPolicy: {{ .Values.service.externalTrafficPolicy }}
  ports:
    - port: {{ .Values.ports.knock }}
      targetPort: {{ .Values.ports.knock }}
      protocol: UDP
      name: knock
    - port: {{ .Values.ports.auth }}
      targetPort: {{ .Values.ports.auth }}
      protocol: TCP
      name: auth
  selector:
    app: {{ .Chart.Name }}
