apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Chart.Name }}
  namespace: {{ include "kcd.namespace" . }}
  labels:
    app.kubernetes.io/name: {{ .Chart.Name }}
    app.kubernetes.io/managed-by: {{ .Release.Service }}
spec:
  replicas: {{ .Values.replicas }}
  selector:
    matchLabels:
      app: {{ .Chart.Name }}
  template:
    metadata:
      labels:
        app: {{ .Chart.Name }}
        {{- if .Values.azureWorkloadIdentity.clientId }}
        azure.workload.identity/use: "true"
        {{- end }}
    spec:
      serviceAccountName: {{ .Chart.Name }}
      containers:
        - name: {{ .Chart.Name }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - containerPort: {{ .Values.ports.knock }}
              protocol: UDP
              name: knock
            - containerPort: {{ .Values.ports.auth }}
              protocol: TCP
              name: auth
            - containerPort: {{ .Values.ports.health }}
              protocol: TCP
              name: health
          env:
            - name: KCD_KNOCK_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ if .Values.secrets.existingSecret }}{{ .Values.secrets.existingSecret }}{{ else }}{{ .Chart.Name }}-credentials{{ end }}
                  key: kcd-knock-password
            - name: KCD_ACCESS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ if .Values.secrets.existingSecret }}{{ .Values.secrets.existingSecret }}{{ else }}{{ .Chart.Name }}-credentials{{ end }}
                  key: kcd-access-password
            - name: KCD_IP_TTL_HOURS
              value: {{ .Values.ipTtlHours | quote }}
            - name: KCD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: KCD_AUTH_NETPOL_NAME
              value: {{ .Chart.Name }}-auth-netpol
            - name: KCD_KNOCK_PORT
              value: {{ .Values.ports.knock | quote }}
            - name: KCD_AUTH_PORT
              value: {{ .Values.ports.auth | quote }}
            - name: KCD_HEALTH_PORT
              value: {{ .Values.ports.health | quote }}
          {{- if .Values.networkPolicy.alwaysAllowedCIDRs }}
            - name: KCD_ALWAYS_ALLOWED_CIDRS
              value: {{ join "," .Values.networkPolicy.alwaysAllowedCIDRs | quote }}
          {{- end }}
          {{- if .Values.tls.mode }}
            - name: KCD_TLS_CERT_PATH
              value: /certs/tls.crt
            - name: KCD_TLS_KEY_PATH
              value: /certs/tls.key
          {{- end }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          readinessProbe:
            tcpSocket:
              port: {{ .Values.ports.health }}
            initialDelaySeconds: 3
            periodSeconds: 5
          livenessProbe:
            tcpSocket:
              port: {{ .Values.ports.health }}
            initialDelaySeconds: 5
            periodSeconds: 10
          {{- if .Values.tls.mode }}
          volumeMounts:
            - name: tls-certs
              mountPath: /certs
              readOnly: true
          {{- end }}
      {{- if .Values.tls.mode }}
      volumes:
        - name: tls-certs
          secret:
            secretName: {{ if eq .Values.tls.mode "secret" }}{{ .Values.tls.secret.name }}{{ else }}{{ .Chart.Name }}-tls{{ end }}
      {{- end }}
