apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: cloakingdevices.klingon-cloaking-device.example.com
  labels:
    app.kubernetes.io/name: {{ .Chart.Name }}
    app.kubernetes.io/managed-by: {{ .Release.Service }}
spec:
  group: klingon-cloaking-device.example.com
  names:
    kind: CloakingDevice
    listKind: CloakingDeviceList
    plural: cloakingdevices
    singular: cloakingdevice
    shortNames:
      - cd
  scope: Namespaced
  versions:
    - name: v1alpha1
      served: true
      storage: true
      schema:
        openAPIV3Schema:
          type: object
          description: Declares that a Service should be hidden by klingon-cloaking-device IP whitelisting.
          properties:
            spec:
              type: object
              required:
                - serviceName
              properties:
                serviceName:
                  type: string
                  description: Name of the Kubernetes Service to cloak (must be in the same namespace as this resource).
                ttlHours:
                  type: integer
                  minimum: 0
                  default: 24
                  description: Hours before an authorized IP is removed from the Service's loadBalancerSourceRanges. 0 disables expiry.
      additionalPrinterColumns:
        - name: Service
          type: string
          jsonPath: .spec.serviceName
        - name: TTL
          type: integer
          jsonPath: .spec.ttlHours
        - name: Age
          type: date
          jsonPath: .metadata.creationTimestamp
