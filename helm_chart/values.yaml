# Override the release namespace for all resources.
# Leave empty to use the Helm release namespace (--namespace flag).
namespaceOverride: ""

image:
  repository: ghcr.io/thenotary/klingon-cloaking-device-server
  # Defaults to Chart appVersion when empty.
  tag: ""
  pullPolicy: IfNotPresent

replicas: 1

ports:
  knock: 9000
  auth: 9001

service:
  # Local preserves client source IP — required for knock-to-auth IP correlation.
  # Cluster (default K8s behavior) SNAT's source IPs, breaking KCD's design.
  externalTrafficPolicy: Local

resources:
  requests:
    cpu: 5m
    memory: 64Mi
  limits:
    cpu: 200m
    memory: 256Mi

ipTtlHours: "24"

serviceAccount:
  annotations: {}

# Set to your Azure managed identity client ID to enable Azure Workload Identity.
# Leave empty to disable.
azureWorkloadIdentity:
  clientId: ""

secrets:
  # Name of an existing K8s Secret containing kcd-knock-password and kcd-access-password keys.
  existingSecret: ""
  # If existingSecret is empty, these values are used to create a Secret.
  knockPassword: ""
  accessPassword: ""

tls:
  # One of: certManager, secret, inline, or "" (disabled)
  mode: ""

  # cert-manager mode: creates a Certificate CR that provisions a TLS Secret.
  certManager:
    issuerName: "letsencrypt-prod"
    issuerKind: "ClusterIssuer"
    dnsNames: ["kcd.example.com"]

  # secret mode: reference an existing kubernetes.io/tls Secret by name.
  secret:
    name: ""

  # inline mode: provide base64-encoded PEM cert chain and private key.
  inline:
    crt: ""
    key: ""

networkPolicy:
  enabled: true
  # CIDRs allowed to reach the auth port (TCP 9001).
  # Must include 0.0.0.0/0 for internet-facing LoadBalancer services since
  # external clients connect to the auth port after a valid UDP knock.
  # The KCD application enforces authorization via the knock mechanism.
  # Azure-specific entries are needed for LB health probes and kubelet probes.
  alwaysAllowedCIDRs:
    - "0.0.0.0/0"          # Internet clients (app-level auth via knock)
    - "168.63.129.16/32"   # Azure LB health probe
    - "10.224.0.0/16"      # AKS node subnet (kubelet probes)
