# Override the release namespace for all resources.
# Leave empty to use the Helm release namespace (--namespace flag).
namespaceOverride: ""

image:
  repository: ghcr.io/thenotary/klingon-cloaking-device-server
  # Defaults to Chart appVersion when empty.
  tag: ""
  pullPolicy: IfNotPresent

replicas: 1

ports:
  knock: 9000
  auth: 9001
  health: 9002

service:
  # Local preserves client source IP — required for knock-to-auth IP correlation.
  # Cluster (default K8s behavior) SNAT's source IPs, breaking KCD's design.
  externalTrafficPolicy: Local

resources:
  requests:
    cpu: 5m
    memory: 64Mi
  limits:
    cpu: 200m
    memory: 256Mi

ipTtlHours: "24"

serviceAccount:
  annotations: {}

# Set to your Azure managed identity client ID to enable Azure Workload Identity.
# Leave empty to disable.
azureWorkloadIdentity:
  clientId: ""

secrets:
  # Name of an existing K8s Secret containing kcd-knock-password and kcd-access-password keys.
  existingSecret: ""
  # If existingSecret is empty, these values are used to create a Secret.
  knockPassword: ""
  accessPassword: ""

tls:
  # One of: certManager, secret, inline, or "" (disabled)
  mode: ""

  # cert-manager mode: creates a Certificate CR that provisions a TLS Secret.
  certManager:
    issuerName: "letsencrypt-prod"
    issuerKind: "ClusterIssuer"
    dnsNames: ["kcd.example.com"]

  # secret mode: reference an existing kubernetes.io/tls Secret by name.
  secret:
    name: ""

  # inline mode: provide base64-encoded PEM cert chain and private key.
  inline:
    crt: ""
    key: ""

networkPolicy:
  enabled: true
  # UPDATE: Turns out these can be blank now?... 
  # It was once believed that these entries were required to make sure the
  # services being cloaked would remain healthy from the perspective of k8s
  # but I'm not convinced so am going to test leaving them blank for a bit.
  #
  # CIDRs always allowed to reach the auth port (TCP 9001).
  # Do NOT add 0.0.0.0/0 here — that defeats the cloaking mechanism by
  # allowing any IP to complete a TCP handshake (revealing the port is open).
  # External client access is granted dynamically per-IP after a valid UDP knock.
  # Only infrastructure CIDRs (health probes, node subnet) belong here.
  alwaysAllowedCIDRs: []
    # - "168.63.129.16/32" # Azure LB health probe
    # - "10.0.0.0/8"       # Allow private network access (health proves)
